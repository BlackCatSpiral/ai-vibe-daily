name: AI Vibe Coding 早报 - 每日生成

on:
  schedule:
    # 每天早上 7:30 UTC+8 (23:30 UTC) 运行
    - cron: '30 23 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: '强制重新生成'
        required: false
        default: 'false'

jobs:
  generate-daily-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install supabase requests
        
    - name: Generate daily news
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      run: |
        python scripts/generate_daily_news.py
        
    - name: Check if new images were created
      id: check_images
      run: |
        if git diff --name-only | grep -q "public/images/news/"; then
          echo "new_images=true" >> $GITHUB_OUTPUT
        else
          echo "new_images=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Commit new images
      if: steps.check_images.outputs.new_images == 'true'
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add public/images/news/
        git commit -m "Add news images for $(date +%Y-%m-%d)"
        git push
        
    - name: Notify on failure
      if: failure()
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      run: |
        curl -X POST "$FEISHU_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d '{
            "msg_type": "text",
            "content": {
              "text": "❌ 早报生成失败: ${{ github.run_id }}\n时间: '$(date)'\n请检查 Actions 日志"
            }
          }'
